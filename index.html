<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaxzod Rustamov | Viewfinder</title>
    <!-- FontAwesome Ikonkalari -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Shriftlar: qo'lyozma ruhidagi serif + geometrik sans + kamera-HUD monospace -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ============ TOKENLAR ============ */
        :root {
            --void: #090C1A;
            --deep: #10182F;
            --turquoise: #1FA6A0;
            --gold: #C9A24B;
            --ivory: #EFE6D3;
            --terracotta: #8C3B3B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--void);
            color: var(--ivory);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            overflow: hidden;
            position: relative;
        }

        /* ============ FON QATLAMLARI ============ */

        /* Xiralashgan profil surati - chuqurlik uchun */
        .bg-blur-image {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: url('photo_2026-07-09_10-46-02.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.18) saturate(1.3) sepia(0.15);
            z-index: -3;
            transform: scale(1.05);
            transition: transform 0.4s ease-out;
        }

        /* Samarqand koshinlariga xos sakkiz qirrali yulduz naqshi (SVG pattern) */
        #tile-pattern {
            position: fixed;
            inset: -20%;
            width: 140%;
            height: 140%;
            z-index: -2;
            opacity: 0.16;
            animation: driftPattern 90s linear infinite;
        }

        @keyframes driftPattern {
            0%   { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-4%, -3%) rotate(1.5deg); }
        }

        /* Zarra ("chang zarralari" / film grain) uchun canvas */
        #dust-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* ============ VIEWFINDER RAMKA (imzo elementi) ============ */
        .viewfinder {
            position: relative;
            width: 100%;
            max-width: 420px;
        }

        .bracket {
            position: absolute;
            width: 26px;
            height: 26px;
            border: 2px solid var(--gold);
            opacity: 0.85;
            z-index: 3;
        }
        .bracket.tl { top: -10px; left: -10px; border-right: none; border-bottom: none; }
        .bracket.tr { top: -10px; right: -10px; border-left: none; border-bottom: none; }
        .bracket.bl { bottom: -10px; left: -10px; border-right: none; border-top: none; }
        .bracket.br { bottom: -10px; right: -10px; border-left: none; border-top: none; }

        /* Kamera HUD - qizil nuqta va yorliq */
        .hud-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: var(--turquoise);
            padding: 0 4px 14px;
            opacity: 0.85;
        }
        .hud-rec {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--terracotta);
        }
        .hud-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--terracotta);
            animation: blinkDot 1.6s ease-in-out infinite;
        }
        @keyframes blinkDot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.25; }
        }

        /* Asosiy quti - iris ochilish animatsiyasi bilan */
        .container {
            width: 100%;
            text-align: center;
            background: linear-gradient(180deg, rgba(16,24,47,0.82), rgba(9,12,26,0.9));
            border: 1px solid rgba(201, 162, 75, 0.25);
            padding: 34px 26px 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            position: relative;
            clip-path: circle(0% at 50% 38%);
            animation: irisOpen 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
        }

        @keyframes irisOpen {
            to { clip-path: circle(85% at 50% 38%); }
        }

        /* Nozik ichki ramka chizig'i - koshin bezagi uslubida */
        .container::before {
            content: "";
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(31, 166, 160, 0.25);
            pointer-events: none;
        }

        /* ============ PROFIL / FOKUS HALQASI ============ */
        .profile-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 4px auto 22px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-img {
            width: 104px;
            height: 104px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 2;
            border: 2px solid var(--gold);
            box-shadow: 0 0 0 4px rgba(9,12,26,0.9), 0 0 30px rgba(201,162,75,0.25);
        }

        /* Avtofokus "snap" halqasi - neon pulsatsiya o'rniga */
        .focus-ring {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 1px solid var(--turquoise);
            z-index: 1;
            animation: focusSnap 5s ease-out infinite;
        }
        @keyframes focusSnap {
            0%   { transform: scale(1.6); opacity: 0; filter: blur(4px); }
            12%  { transform: scale(1);   opacity: 0.9; filter: blur(0); }
            22%  { transform: scale(1.04); opacity: 0.6; }
            30%  { transform: scale(1); opacity: 0.45; }
            85%  { opacity: 0.45; }
            100% { transform: scale(1.6); opacity: 0; filter: blur(4px); }
        }

        /* Ism - qo'lyozma ruhidagi serif */
        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            color: var(--ivory);
        }
        .name span {
            color: var(--gold);
        }

        /* Typewriter matni */
        .typewriter-container {
            height: 20px;
            margin-bottom: 30px;
        }
        .bio-dynamic {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            color: var(--turquoise);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-right: 2px solid var(--gold);
            white-space: nowrap;
            animation: blink 0.75s step-end infinite;
        }
        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: var(--gold); }
        }

        /* ============ HAVOLALAR ============ */
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(239, 230, 211, 0.03);
            color: var(--ivory);
            text-decoration: none;
            padding: 14px 20px;
            border: 1px solid rgba(239, 230, 211, 0.1);
            border-left: 3px solid transparent;
            transition: all 0.35s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-title {
            font-weight: 600;
            font-size: 0.98rem;
            letter-spacing: 0.4px;
        }

        .btn-stats {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: rgba(239, 230, 211, 0.4);
            margin-top: 4px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .link-btn i {
            position: absolute;
            left: 22px;
            font-size: 1.25rem;
            transition: transform 0.3s ease;
            opacity: 0.9;
        }

        .link-btn:hover {
            transform: translateX(2px);
            background: rgba(239, 230, 211, 0.06);
        }

        .link-btn:hover i {
            transform: scale(1.15);
        }

        .telegram:hover { border-left-color: #3AB0DE; color: #3AB0DE; }
        .telegram:hover .btn-stats { color: rgba(58, 176, 222, 0.75); }

        .youtube:hover { border-left-color: #D9534F; color: #D9534F; }
        .youtube:hover .btn-stats { color: rgba(217, 83, 79, 0.75); }

        .portfolio:hover { border-left-color: var(--turquoise); color: var(--turquoise); }
        .portfolio:hover .btn-stats { color: rgba(31, 166, 160, 0.75); }

        .instagram:hover { border-left-color: var(--gold); color: var(--gold); }
        .instagram:hover .btn-stats { color: rgba(201, 162, 75, 0.75); }

        /* Ulashish tugmasi */
        .share-btn {
            margin-top: 26px;
            background: none;
            border: none;
            color: rgba(239, 230, 211, 0.35);
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            width: 100%;
            transition: color 0.3s;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .share-btn:hover {
            color: var(--turquoise);
        }

        /* Toast bildirishnomasi */
        #toast {
            visibility: hidden;
            min-width: 220px;
            background: rgba(16, 24, 47, 0.97);
            color: var(--turquoise);
            border: 1px solid var(--turquoise);
            box-shadow: 0 0 24px rgba(31, 166, 160, 0.3);
            text-align: center;
            border-radius: 4px;
            padding: 14px;
            position: fixed;
            z-index: 10;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }
        #toast.show { visibility: visible; bottom: 40px; opacity: 1; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Xiralashgan orqa fon rasmi -->
    <div class="bg-blur-image" id="bg-img"></div>

    <!-- Samarqand koshin naqshi -->
    <svg id="tile-pattern" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <pattern id="star8" width="72" height="72" patternUnits="userSpaceOnUse">
                <g stroke="#C9A24B" stroke-width="1" fill="none">
                    <path d="M36 4 L46 26 L68 36 L46 46 L36 68 L26 46 L4 36 L26 26 Z" />
                    <circle cx="36" cy="36" r="10" stroke="#1FA6A0" />
                </g>
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#star8)" />
    </svg>

    <!-- Chang zarralari (film grain) uchun canvas -->
    <canvas id="dust-canvas"></canvas>

    <div class="viewfinder">
        <div class="bracket tl"></div>
        <div class="bracket tr"></div>
        <div class="bracket bl"></div>
        <div class="bracket br"></div>

        <div class="hud-strip">
            <span class="hud-rec"><span class="hud-dot"></span>REC</span>
            <span>SAMARQAND</span>
        </div>

        <div class="container">
            <!-- Profil qismi -->
            <div class="profile-wrapper">
                <div class="focus-ring"></div>
                <img src="photo_2026-07-09_10-46-02.jpg" alt="Profil Rasmi" class="profile-img">
            </div>

            <h1 class="name">Shaxzod <span>Rustamov</span></h1>

            <!-- Dinamik yoziladigan matn -->
            <div class="typewriter-container">
                <span class="bio-dynamic" id="dynamic-text"></span>
            </div>

            <!-- Havolalar qismi -->
            <div class="links">
                <a href="https://t.me/Mobilografsamarqand" class="link-btn telegram" target="_blank">
                    <i class="fab fa-telegram"></i>
                    <span class="btn-title">Telegram Kanalim</span>
                    <span class="btn-stats">TELEGRAM PORTFOLIO</span>
                </a>

                <a href="https://youtube.com/@shaxzodmobil?si=c_gwudzCcrX3az83" class="link-btn youtube" target="_blank">
                    <i class="fab fa-youtube"></i>
                    <span class="btn-title">YouTube Channel</span>
                    <span class="btn-stats">QIZIQISH UCHUN</span>
                </a>

                <a href="https://t.me/RUSTAMOV016" class="link-btn portfolio" target="_blank">
                    <i class="fab fa-telegram-plane"></i>
                    <span class="btn-title">Bog'lanish (Telegram)</span>
                    <span class="btn-stats">Xizmatlar va Hamkorlik uchun</span>
                </a>

                <a href="https://www.instagram.com/shaxzod.dev/?__pwa=1#" class="link-btn instagram" target="_blank">
                    <i class="fab fa-instagram"></i>
                    <span class="btn-title">INSTAGRAM</span>
                    <span class="btn-stats">FOTO VA VIDEO</span>
                </a>
            </div>

            <!-- Ulashish tugmasi -->
            <button class="share-btn" onclick="copyLink()">
                <i class="fas fa-share-alt"></i> Sahifa nusxasini olish
            </button>
        </div>
    </div>

    <div id="toast"><i class="fas fa-check-circle"></i> TIZIM: Havola nusxalandi!</div>

    <script>
        // 1. SAHIFA LINKINI NUSXALASH
        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const toast = document.getElementById("toast");
                toast.classList.add("show");
                setTimeout(() => { toast.classList.remove("show"); }, 2500);
            });
        }

        // 2. DINAMIK TYPEWRITER (YOZILISH) ANIMATSIYASI
        const words = ["MOBILOGRAF", "GRAPHIC DESIGNER", "DEVELOPER", "BLOGER"];
        let i = 0;
        let timer;

        function typingEffect() {
            let word = words[i].split("");
            var loopTyping = function() {
                if (word.length > 0) {
                    document.getElementById('dynamic-text').innerHTML += word.shift();
                } else {
                    setTimeout(deletingEffect, 2000);
                    return false;
                }
                timer = setTimeout(loopTyping, 100);
            };
            loopTyping();
        }

        function deletingEffect() {
            let word = words[i].split("");
            var loopDeleting = function() {
                if (word.length > 0) {
                    word.pop();
                    document.getElementById('dynamic-text').innerHTML = word.join("");
                } else {
                    if (words.length > (i + 1)) { i++; } else { i = 0; }
                    setTimeout(typingEffect, 500);
                    return false;
                }
                timer = setTimeout(loopDeleting, 50);
            };
            loopDeleting();
        }
        typingEffect();

        // 3. PARALLAX EFFEKTI (FON RASMI UCHUN)
        const bgImg = document.getElementById('bg-img');
        const tilePattern = document.getElementById('tile-pattern');
        let mouseX = 0, mouseY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) / 45;
            mouseY = (e.clientY - window.innerHeight / 2) / 45;
            bgImg.style.transform = `translate(${-mouseX}px, ${-mouseY}px) scale(1.05)`;
            tilePattern.style.transform = `translate(${-mouseX * 1.6}px, ${-mouseY * 1.6}px)`;
        });

        // 4. CHANG ZARRALARI (FILM GRAIN / LIGHT-LEAK TRAIL)
        const dustCanvas = document.getElementById('dust-canvas');
        const ctx = dustCanvas.getContext('2d');
        let motes = [];

        function resizeDustCanvas() {
            dustCanvas.width = window.innerWidth;
            dustCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeDustCanvas);
        resizeDustCanvas();

        class Mote {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 2.5 + 1;
                this.speedX = (Math.random() - 0.5) * 0.6;
                this.speedY = (Math.random() - 0.5) * 0.6 - 0.15;
                this.life = 1;
                this.gold = Math.random() > 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.012;
            }
            draw() {
                ctx.globalAlpha = Math.max(this.life, 0) * 0.7;
                ctx.fillStyle = this.gold ? '#C9A24B' : '#1FA6A0';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 2; i++) {
                motes.push(new Mote(e.clientX, e.clientY));
            }
            if (motes.length > 200) motes.splice(0, motes.length - 200);
        });

        window.addEventListener('touchmove', (e) => {
            motes.push(new Mote(e.touches[0].clientX, e.touches[0].clientY));
        });

        function animateDust() {
            ctx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
            for (let i = 0; i < motes.length; i++) {
                motes[i].update();
                motes[i].draw();
                if (motes[i].life <= 0) {
                    motes.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateDust);
        }
        animateDust();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaxzod Rustamov | Kiber Portfoliom</title>
    <!-- FontAwesome Ikonkalari -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Umumiy sozlamalar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #05020f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* 3D Canvas va Orqa fon rasmi uchun qatlam */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Sichqoncha quyrug'i (Trail) uchun canvas */
        #trail-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-blur-image {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: url('photo_2026-07-09_10-46-02.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(50px) brightness(0.2) saturate(1.8);
            z-index: -1;
            transform: scale(1.05);
            transition: transform 0.3s ease-out;
        }

        /* Asosiy Shishasimon (Glassmorphism) Konteyner */
        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            background: rgba(7, 4, 20, 0.55);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.2);
            z-index: 2;
            position: relative;
        }

        /* Profil hududi va pulsatsiyalanuvchi kiber-halqa */
        .profile-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 10px auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 2;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
        }

        .pulse-ring {
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 2px solid #00f0ff;
            animation: pulse 2.5s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0% { transform: scale(0.85); opacity: 1; }
            100% { transform: scale(1.25); opacity: 0; border-color: #ff007f; }
        }

        /* Ism uchun neon gradient effekti */
        .name {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            background: linear-gradient(45deg, #00f0ff, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
        }

        /* Gologrammali Typewriter Matni */
        .typewriter-container {
            height: 20px;
            margin-bottom: 35px;
        }
        .bio-dynamic {
            font-size: 0.95rem;
            color: #00f0ff;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            border-right: 2px solid #ff007f;
            white-space: nowrap;
            animation: blink 0.75s step-end infinite;
        }
        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #ff007f; }
        }

        /* Havolalar qutisi */
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Kiber Neon Tugmalar */
        .link-btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .btn-title {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        /* Ijtimoiy statistika matni */
        .btn-stats {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 3px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .link-btn i {
            position: absolute;
            left: 24px;
            font-size: 1.4rem;
            transition: transform 0.3s ease;
        }

        .link-btn:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4);
        }

        .link-btn:hover i {
            transform: scale(1.25) rotate(-10deg);
        }

        /* Neon Hover effektlari */
        .telegram:hover { border-color: #0088cc; box-shadow: 0 0 25px rgba(0, 136, 204, 0.5); color: #0088cc; }
        .telegram:hover .btn-stats { color: rgba(0, 136, 204, 0.8); }
        
        .youtube:hover { border-color: #ff0000; box-shadow: 0 0 25px rgba(255, 0, 0, 0.5); color: #ff0000; }
        .youtube:hover .btn-stats { color: rgba(255, 0, 0, 0.8); }

        .portfolio:hover { border-color: #00ff88; box-shadow: 0 0 25px rgba(0, 255, 136, 0.5); color: #00ff88; }
        .portfolio:hover .btn-stats { color: rgba(0, 255, 136, 0.8); }

        .instagram:hover { border-color: #ff007f; box-shadow: 0 0 25px rgba(255, 0, 127, 0.5); color: #ff007f; }
        .instagram:hover .btn-stats { color: rgba(255, 0, 127, 0.8); }

        /* Ulashish tugmasi */
        .share-btn {
            margin-top: 30px;
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            transition: color 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .share-btn:hover {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
        }

        /* Toast bildirishnomasi */
        #toast {
            visibility: hidden;
            min-width: 220px;
            background: rgba(7, 4, 20, 0.95);
            color: #00f0ff;
            border: 1px solid #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            text-align: center;
            border-radius: 12px;
            padding: 14px;
            position: fixed;
            z-index: 10;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }
        #toast.show { visibility: visible; bottom: 40px; opacity: 1; }
    </style>
</head>
<body>

    <!-- Xiralashgan interaktiv orqa fon rasmi -->
    <div class="bg-blur-image" id="bg-img"></div>

    <!-- Three.js 3D Zarrachalar foni -->
    <canvas id="bg-canvas"></canvas>

    <!-- Interaktiv sichqoncha nuri uchun canvas -->
    <canvas id="trail-canvas"></canvas>

    <div class="container">
        <!-- Profil qismi -->
        <div class="profile-wrapper">
            <div class="pulse-ring"></div>
            <img src="photo_2026-07-09_10-46-02.jpg" alt="Profil Rasmi" class="profile-img">
        </div>
        
        <h1 class="name">Shaxzod Rustamov</h1>
        
        <!-- Dinamik yoziladigan matn -->
        <div class="typewriter-container">
            <span class="bio-dynamic" id="dynamic-text"></span>
        </div>

        <!-- Havolalar qismi -->
        <div class="links">
            <a href="https://t.me/Mobilografsamarqand" class="link-btn telegram" target="_blank">
                <i class="fab fa-telegram"></i>
                <span class="btn-title">Telegram Kanalim</span>
                <span class="btn-stats">TELEGRAM PORTFOLIO</span>
                
            </a>
            
            <a href="https://youtube.com/@shaxzodmobil?si=c_gwudzCcrX3az83" class="link-btn youtube" target="_blank">
                <i class="fab fa-youtube"></i>
                <span class="btn-title">YouTube Channel</span>
                <span class="btn-stats">QIZIQISH UCHUN</span>
                
            </a>
            
            <a href="https://t.me/RUSTAMOV016" class="link-btn portfolio" target="_blank">
                <i class="fab fa-telegram-plane"></i>
                <span class="btn-title">Bog'lanish (Telegram)</span>
                <span class="btn-stats">Xizmatlar va Hamkorlik uchun</span>
            </a>
            
            <a href="https://www.instagram.com/shaxzod.dev/?__pwa=1#" class="link-btn instagram" target="_blank">
                <i class="fab fa-instagram"></i>
                <span class="btn-title">INSTAGRAM</span>
                <span class="btn-stats">FOTO VA VIDEO</span>
            </a>
        </div>

        <!-- Ulashish tugmasi -->
        <button class="share-btn" onclick="copyLink()">
            <i class="fas fa-share-alt"></i> Sahifa nusxasini olish
        </button>
    </div>

    <div id="toast"><i class="fas fa-check-circle"></i> TIZIM: Havola nusxalandi!</div>

    <!-- Three.js Kutubxonasi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. SAHIFA LINKINI NUSXALASH
        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const toast = document.getElementById("toast");
                toast.classList.add("show");
                setTimeout(() => { toast.classList.remove("show"); }, 2500);
            });
        }

        // 2. DINAMIK TYPEWRITER (YOZILISH) ANIMATSIYASI
        const words = ["MOBILOGRAF", "GRAPHIC DESIGNER", "DEVELOPER", "BLOGER"];
        let i = 0;
        let timer;

        function typingEffect() {
            let word = words[i].split("");
            var loopTyping = function() {
                if (word.length > 0) {
                    document.getElementById('dynamic-text').innerHTML += word.shift();
                } else {
                    setTimeout(deletingEffect, 2000);
                    return false;
                }
                timer = setTimeout(loopTyping, 100);
            };
            loopTyping();
        }

        function deletingEffect() {
            let word = words[i].split("");
            var loopDeleting = function() {
                if (word.length > 0) {
                    word.pop();
                    document.getElementById('dynamic-text').innerHTML = word.join("");
                } else {
                    if (words.length > (i + 1)) { i++; } else { i = 0; }
                    setTimeout(typingEffect, 500);
                    return false;
                }
                timer = setTimeout(loopDeleting, 50);
            };
            loopDeleting();
        }
        typingEffect();

        // 3. PARALLAX EFFEKTI (FON RASMI UCHUN)
        const bgImg = document.getElementById('bg-img');
        let mouseX = 0, mouseY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) / 45;
            mouseY = (e.clientY - window.innerHeight / 2) / 45;
            bgImg.style.transform = `translate(${-mouseX}px, ${-mouseY}px) scale(1.05)`;
        });

        // 4. THREE.JS 3D KOSMIK ZARRACHALAR
        const canvas = document.querySelector('#bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 150; 
        const posArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 12;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.035,
            color: 0x00f0ff,
            transparent: true,
            opacity: 0.65,
            blending: THREE.AdditiveBlending
        });

        const particleMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particleMesh);

        let targetX = 0, targetY = 0;
        window.addEventListener('mousemove', (event) => {
            targetX = (event.clientX - window.innerWidth / 2) * 0.0008;
            targetY = (event.clientY - window.innerHeight / 2) * 0.0008;
        });

        // 5. SICHQONCHA ORTIDAN ERGASHUVCHI NEON TRAIL (INTERAKTIV QIDIRUV)
        const trailCanvas = document.getElementById('trail-canvas');
        const ctx = trailCanvas.getContext('2d');
        let spots = [];
        let hue = 180; // Cyan rangdan boshlanadi

        function resizeTrailCanvas() {
            trailCanvas.width = window.innerWidth;
            trailCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeTrailCanvas();
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        resizeTrailCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 4 + 2;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.color = `hsl(${hue}, 100%, 60%)`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.1) this.size -= 0.08;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 3; i++) {
                spots.push(new Particle(e.clientX, e.clientY));
            }
            hue = (hue + 1) % 360; // Rang o'zgarib turadi
        });

        // Sensorli ekranlar (Telefonlar) uchun trail effekti
        window.addEventListener('touchmove', (e) => {
            for (let i = 0; i < 2; i++) {
                spots.push(new Particle(e.touches[0].clientX, e.touches[0].clientY));
            }
        });

        function handleParticles() {
            for (let i = 0; i < spots.length; i++) {
                spots[i].update();
                spots[i].draw();
                if (spots[i].size <= 0.3) {
                    spots.splice(i, 1);
                    i--;
                }
            }
        }

        // Asosiy birlashtirilgan Render Loop
        const clock = new THREE.Clock();
        const animate = () => {
            window.requestAnimationFrame(animate);
            
            // 2D Trail tozalash va chizish
            ctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
            handleParticles();

            // 3D Animatsiya
            const elapsedTime = clock.getElapsedTime();
            particleMesh.rotation.y = elapsedTime * 0.04;
            particleMesh.rotation.x = elapsedTime * 0.015;
            particleMesh.rotation.y += (targetX - particleMesh.rotation.y) * 0.1;
            particleMesh.rotation.x += (-targetY - particleMesh.rotation.x) * 0.1;

            renderer.render(scene, camera);
        };
        animate();
    </script>
</body>
</html>
